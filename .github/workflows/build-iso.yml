name: Build AurionOS ISO

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:  # Manual trigger

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Free disk space
        run: |
          echo "=== Disk before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune --all --force 2>/dev/null || true
          echo "=== Disk after cleanup ==="
          df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: |
          chmod +x iso-build/build-iso.sh
          chmod +x iso-build/setup-builder.sh
          chmod +x iso-build/hooks/*.chroot
          chmod +x distro/bin/aurion-session

      - name: Install build tools
        run: |
          sudo apt update
          sudo ./iso-build/setup-builder.sh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure Rust for root
        run: |
          # The dtolnay action installs for 'runner' user.
          # Copy the toolchain config so sudo (root) can also use it.
          RUSTUP_HOME=$(rustup show home)
          CARGO_HOME=$(dirname $(which cargo))/..
          echo "RUSTUP_HOME=$RUSTUP_HOME" >> $GITHUB_ENV
          echo "CARGO_HOME=$CARGO_HOME" >> $GITHUB_ENV
          sudo env "PATH=$PATH" "RUSTUP_HOME=$RUSTUP_HOME" "CARGO_HOME=$CARGO_HOME" rustup default stable

      - name: Build AurionOS ISO
        run: sudo env "PATH=$PATH" "RUSTUP_HOME=$RUSTUP_HOME" "CARGO_HOME=$CARGO_HOME" ./iso-build/build-iso.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: aurion-os-alpha-iso
          path: iso-build/output/*.iso
          retention-days: 14

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: iso-build/output/build.log
          retention-days: 7
