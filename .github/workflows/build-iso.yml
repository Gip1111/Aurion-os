name: Build AurionOS ISO

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:  # Manual trigger

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt update
          sudo ./iso-build/setup-builder.sh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build AurionOS ISO
        run: sudo ./iso-build/build-iso.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: aurion-os-alpha-iso
          path: iso-build/output/*.iso
          retention-days: 14

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: iso-build/output/build.log
          retention-days: 7
