---
# AurionOS Calamares — Post-install configuration hook

# This runs commands inside the installed system after file copy is complete.

dontChroot: false
timeout: 120

firmwareType:
    efi:
        - command: "update-grub"
        - command: "plymouth-set-default-theme aurion"
    bios:
        - command: "update-grub"
        - command: "plymouth-set-default-theme aurion"

# Set up AurionOS after install
- command: "systemctl enable greetd"
- command: "systemctl disable gdm3"
  timeout: 10
- command: "flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo"
  timeout: 30
